default_agent: devops_agent
agents:
  devops_agent:
    name: devops_agent
    entrypoint: agent.py
    platform: linux/amd64
    container_runtime: docker
    aws:
      execution_role: arn:aws:iam::650251690796:role/devops-agent-runner
      account: '650251690796'
      region: ap-southeast-2
      ecr_repository: 650251690796.dkr.ecr.ap-southeast-2.amazonaws.com/bedrock_agentcore-devops_agent
      ecr_auto_create: false
      network_configuration:
        network_mode: PUBLIC
      observability:
        enabled: true
