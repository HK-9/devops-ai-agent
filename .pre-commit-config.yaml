# Backstage-style pre-commit config
# Runs lint + format auto-fix on staged files before each commit.
# Install:  pre-commit install
repos:
  # ── Housekeeping ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  # ── Lint + Format (ruff = eslint + prettier equivalent) ──────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff          # lint + auto-fix staged files
        args: [--fix, --unsafe-fixes]
      - id: ruff-format   # auto-format staged files
